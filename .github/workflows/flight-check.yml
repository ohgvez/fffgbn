name: Flight Price Alert

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  check-flights:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

     - name: Install dependencies
        run: |
          sudo apt-get update
          # Questo trucco crea un finto pacchetto per ingannare i software vecchi
          sudo apt-get install -y equivs
          echo "Section: misc" > libasound2-dummy
          echo "Priority: optional" >> libasound2-dummy
          echo "Package: libasound2" >> libasound2-dummy
          echo "Architecture: all" >> libasound2-dummy
          echo "Provides: libasound2" >> libasound2-dummy
          echo "Description: dummy package for libasound2" >> libasound2-dummy
          equivs-build libasound2-dummy
          sudo dpkg -i libasound2-dummy*.deb
          
          # Ora installiamo il resto in sicurezza
          sudo apt-get install -y libasound2t64 libgbm1 libnss3 libxss1
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run flight alert
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python flight_alert.py
